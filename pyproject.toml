[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "Boulder_Statistics"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
  "prefect (==3.4.24)",
  "joblib (==1.5.2)",
  "tqdm (==4.67.1)",
  "assertpy (==1.1)",
  "requests (==2.32.5)",
  "rich (==13.9.4)",
  "urllib3 (==2.5.0)",
  "dataclasses-json (>=0.6.7,<0.7.0)",
  "py-linq (>=1.4.0,<2.0.0)",
  "pds4-tools (>=1.4,<2.0)",
  "opencv-python (>=4.12.0.88,<5.0.0.0)",
  "pydantic (==2.12.3)",
  "tqdm-joblib (>=0.0.5,<0.0.6)",
  "pandas (>=2.3.3,<3.0.0)",
  "more-itertools (>=10.8.0,<11.0.0)",
  "matplotlib (==3.10.7)",
  "docker (==7.1.0)",
  "graphviz (==0.21)",
  "imageio (==2.37.0)",
  "numpy (==2.2.6)",
  "pillow (==12.0.0)",
  "polars (==1.35.1)",
  "scienceplots (>=2.2.0,<3.0.0)",
  "datashader (>=0.18.2,<0.19.0)",
  "trimesh (>=4.10.0,<5.0.0)",
  "tifffile (>=2025.10.16,<2026.0.0)",
  "libigl (>=2.6.1,<3.0.0)"
]

# Dev dependencies (tests, lint, etc.)
[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-cov = "^4.1"
assertpy = "^1.1"
