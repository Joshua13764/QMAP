[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "bennu-feature-extractor-BoulderNet"
version = "0.1.0"
description = "Foo add-on step for bennu-feature-extractor"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "prefect>=2.14",
  "bennu-feature-extractor>=0.1.0",
  "assertpy (==1.1)",
  "fastapi (==0.119.0)",
  "uvicorn (==0.38.0)",
  "joblib (>=1.5.2,<2.0.0)",
]

[tool.poetry]
packages = [{ include = "bennu_feature_extractor_BoulderNet", from = "src" }]

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
assertpy = "^1.1"

[tool.poetry.dependencies]
bennu-feature-extractor = { path = "../bennu-feature-extractor", develop = true }
