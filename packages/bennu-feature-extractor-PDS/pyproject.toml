[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "bennu-feature-extractor-PDS"
version = "0.1.0"
description = "Foo add-on step for bennu-feature-extractor"
readme = "README.md"
requires-python = ">=3.11,<4.0"
# Runtime deps for PDS itself (do NOT list bennu-feature-extractor here in dev mode)
dependencies = [
  "prefect>=2.14",
  "assertpy (==1.1)",
  "pytest (==8.4.2)",
  "requests (==2.32.5)",
  "pds4-tools (>=1.4,<2.0)",
  "tqdm-joblib (>=0.0.5,<0.0.6)",
  "opencv-python (>=4.12.0.88,<5.0.0.0)",
  "imageio (>=2.37.0,<3.0.0)",
  "pydantic (==2.12.3)",
  "trimesh (>=4.9.0,<5.0.0)",
  "polars (>=1.35.1,<2.0.0)",
  "libigl (>=2.6.1,<3.0.0)",
  "pandas (>=2.3.3,<3.0.0)",
  "datashader (>=0.18.2,<0.19.0)",
  "colorcet (>=3.1.0,<4.0.0)",
  "tifffile (>=2025.10.16,<2026.0.0)"
]

[tool.poetry]
packages = [{ include = "bennu_feature_extractor_PDS", from = "src" }]

# Local editable dependency on the core package for monorepo work
[tool.poetry.dependencies]
bennu-feature-extractor = { path = "../bennu-feature-extractor", develop = true }

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-cov = "^4.1"
assertpy = "^1.1"
