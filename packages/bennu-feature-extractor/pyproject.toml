[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "bennu-feature-extractor"
version = "0.1.0"
description = "Core pipeline + step base"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "prefect>=2.14",
  "joblib (>=1.5.2,<2.0.0)",
  "tqdm (>=4.66,<5)"
]

[tool.poetry]
packages = [{ include = "bennu_feature_extractor", from = "src" }]

# Dev dependencies (tests, lint, etc.)
[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
assertpy = "^1.1"
