[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "bennu-feature-extractor"
version = "0.1.0"
description = "Core pipeline + step base"
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
  "prefect (==3.2.15)",
  "joblib (==1.5.2)",
  "tqdm (==4.67.1)",
  "assertpy (==1.1)",
  "requests (==2.32.5)",
  "rich (==13.9.4)",
  "urllib3 (==2.5.0)",
  "dataclasses-json (>=0.6.7,<0.7.0)",
  "py-linq (>=1.4.0,<2.0.0)",
  "pds4-tools (>=1.4,<2.0)",
  "opencv-python (>=4.12.0.88,<5.0.0.0)",
  "pydantic (==2.12.3)",
  "tqdm-joblib (>=0.0.5,<0.0.6)"
]

[tool.poetry]
packages = [{ include = "bennu_feature_extractor", from = "src" }]

# Dev dependencies (tests, lint, etc.)
[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-cov = "^4.1"
assertpy = "^1.1"
