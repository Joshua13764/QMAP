[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "bennu-feature-extractor"
version = "0.1.0"
description = "Core pipeline + step base"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "prefect (==3.2.15)",
  "joblib (==1.5.2)",
  "tqdm (==4.67.1)",
  "assertpy (==1.1)",
  "requests (==2.32.5)",
  "rich (==13.9.4)",
  "urllib3 (==2.5.0)"
]

[tool.poetry]
packages = [{ include = "bennu_feature_extractor", from = "src" }]

# Dev dependencies (tests, lint, etc.)
[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
assertpy = "^1.1"
